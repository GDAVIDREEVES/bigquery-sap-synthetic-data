name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev + fast / Polars)
        run: pip install -e ".[dev,fast]"

      - name: Run tests without Spark
        run: pytest -m "not spark" -vv --durations=20
