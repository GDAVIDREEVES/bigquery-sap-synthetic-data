name: CI Spark integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  test-spark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with fast + dev extras
        run: pip install -e ".[dev,fast]"

      - name: Run Spark-marked tests
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: pytest -m spark -vv --durations=20
